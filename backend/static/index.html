<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Панель оператора — отслеживание</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; }

  #status {
    position: absolute; top: 12px; left: 12px; z-index: 500;
    background: rgba(20, 20, 20, 0.85); color: #fff; padding: 6px 12px;
    border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px;
  }
  #status .dot { width: 10px; height: 10px; border-radius: 50%; background: #e74c3c; }
  #status.connected .dot { background: #2ecc71; }

  #toggle-sidebar {
    position: absolute; top: 12px; right: 12px; z-index: 500;
    background: #fff; border: none; border-radius: 6px; padding: 8px 12px;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.3); font-size: 14px;
  }

  #sidebar {
    position: absolute; top: 0; right: 0; bottom: 0; width: 320px; z-index: 400;
    background: #fff; box-shadow: -2px 0 8px rgba(0,0,0,0.2);
    transform: translateX(0); transition: transform 0.25s ease;
    display: flex; flex-direction: column;
  }
  #sidebar.collapsed { transform: translateX(320px); }

  #sidebar-header {
    padding: 56px 16px 12px 16px; border-bottom: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: center;
  }
  #sidebar-header h2 { margin: 0; font-size: 16px; }
  #clear-btn {
    background: #e74c3c; color: #fff; border: none; border-radius: 6px;
    padding: 6px 10px; cursor: pointer; font-size: 13px;
  }
  #clear-btn:hover { background: #c0392b; }

  #points-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; }
  #points-list li {
    padding: 10px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
    font-size: 13px; display: flex; align-items: center; gap: 8px; color: #2c3e50;
    border-left: 4px solid transparent;
  }
  #points-list li:hover { background: #f7f7f7; }
  #points-list li .entry-icon { font-size: 16px; flex-shrink: 0; }
  #points-list .empty { color: #999; text-align: center; padding: 24px 16px; cursor: default; }
  #points-list li.level-observation { background: rgba(76, 175, 80, 0.10); border-left-color: #4CAF50; }
  #points-list li.level-attention { background: rgba(255, 152, 0, 0.12); border-left-color: #FF9800; }
  #points-list li.level-threat { background: rgba(244, 67, 54, 0.14); border-left-color: #F44336; }

  /* --- Треки и история: табы боковой панели --- */
  #sidebar-tabs { display: flex; border-bottom: 1px solid #eee; }
  #sidebar-tabs button {
    flex: 1; background: none; border: none; padding: 10px 4px; cursor: pointer;
    font-size: 11px; letter-spacing: 0.05em; color: #999; border-bottom: 2px solid transparent;
  }
  #sidebar-tabs button.active { color: #1565C0; border-bottom-color: #1565C0; font-weight: 600; }

  #tracks-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; display: none; }
  #tracks-list li {
    padding: 10px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-size: 13px; color: #2c3e50;
  }
  #tracks-list li:hover { background: #f7f7f7; }
  #tracks-list li .track-meta { color: #999; font-size: 11px; margin-top: 2px; }
  #tracks-list .empty { color: #999; text-align: center; padding: 24px 16px; cursor: default; }

  #stats-panel { flex: 1; overflow-y: auto; padding: 16px; display: none; }
  #stats-panel .stat-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid #f0f0f0; font-size: 13px;
  }

  #toast-container {
    position: fixed; top: 20px; right: 20px; z-index: 10000;
    display: flex; flex-direction: column; gap: 10px;
    max-width: 320px;
  }

  .popup-card { font-size: 13px; line-height: 1.6; }
  .popup-card .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }

  .pulse-circle { animation: pulse 1.5s ease-in-out infinite; transform-origin: center; }
  @keyframes pulse {
    0%   { opacity: 1; }
    50%  { opacity: 0.3; }
    100% { opacity: 1; }
  }

  /* --- Уровень угрозы: экстренные визуальные оповещения (промт №4) --- */
  #flash-overlay {
    position: fixed; inset: 0;
    opacity: 0; pointer-events: none;
    z-index: 9998;
    transition: opacity 0.1s ease;
  }

  .alert-toast {
    color: white;
    border-radius: 10px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    animation: slideIn 0.25s ease;
    min-width: 280px;
  }
  .alert-threat      { border-left: 5px solid #FF1744; }
  .alert-attention   { border-left: 5px solid #FFAB00; }
  .alert-observation { border-left: 5px solid #69F0AE; }

  .toast-header {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .toast-close { cursor: pointer; opacity: 0.7; padding: 0 4px; }
  .toast-close:hover { opacity: 1; }
  .toast-body { font-size: 13px; line-height: 1.5; }

  @keyframes slideIn {
    from { transform: translateX(110%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* Пульс маркера УГРОЗЫ (доп. к пульсирующему кругу вокруг него) */
  @keyframes markerPulse {
    0%   { transform: scale(1);   opacity: 1;   }
    50%  { transform: scale(1.4); opacity: 0.4; }
    100% { transform: scale(1);   opacity: 1;   }
  }
  .threat-marker { animation: markerPulse 1.2s ease infinite; }

  /* --- Панель управления звуком --- */
  #sound-controls {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 9999;
    background: #1C1C1E;
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #sound-controls button {
    background: #2C2C2E; border: none; color: white; border-radius: 8px;
    padding: 8px 12px; cursor: pointer;
  }
  #btn-sound-toggle { font-size: 18px; }
  #btn-test { font-size: 12px; }
  #btn-reset { font-size: 12px; color: #FF6B00; }
  #volume-slider { width: 100px; accent-color: #FF6B00; }

  /* --- Экспорт данных смены (GeoJSON/KMZ/CSV) --- */
  #export-btn {
    position: fixed;
    bottom: 20px; left: 20px;
    z-index: 9999;
    background: #1C1C1E; color: #fff; border: none; border-radius: 12px;
    padding: 12px 16px; cursor: pointer; font-size: 13px; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #export-btn:hover { background: #2C2C2E; }

  #export-panel {
    position: fixed;
    left: 20px; bottom: 76px;
    z-index: 9999;
    width: 300px;
    background: #1C1C1E; color: #fff;
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    display: none;
  }
  #export-panel.open { display: block; }
  #export-panel h3 { margin: 0 0 12px 0; font-size: 14px; }
  #export-panel .export-row { margin-bottom: 10px; }
  #export-panel label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
  #export-panel select {
    width: 100%; background: #2C2C2E; color: #fff; border: none; border-radius: 6px;
    padding: 7px 8px; font-size: 13px;
  }
  #export-stats-preview {
    background: #2C2C2E; border-radius: 8px; padding: 8px 10px; margin-bottom: 12px;
    font-size: 12px; line-height: 1.6; color: #ccc;
  }
  #export-stats-preview .stat-line { display: flex; justify-content: space-between; }
  .export-format-buttons { display: flex; gap: 6px; }
  .export-format-buttons button {
    flex: 1; border: none; border-radius: 8px; padding: 9px 4px; cursor: pointer;
    font-size: 12px; font-weight: 600; color: #fff;
  }
  .export-format-buttons button:disabled { opacity: 0.5; cursor: default; }
  #export-geojson-btn { background: #1565C0; }
  #export-kmz-btn { background: #2E7D32; }
  #export-csv-btn { background: #6A1B9A; }
</style>
</head>
<body>

<div id="map"></div>

<div id="status"><span class="dot"></span><span id="status-text">Подключение...</span></div>
<button id="toggle-sidebar">☰ Точки (<span id="points-count">0</span>)</button>
<div id="toast-container"></div>
<div id="flash-overlay"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Полученные точки</h2>
    <button id="clear-btn">Очистить карту</button>
  </div>

  <div id="sidebar-tabs">
    <button id="tab-events" class="active">СОБЫТИЯ</button>
    <button id="tab-tracks">ТРЕКИ</button>
    <button id="tab-stats">СТАТ (12ч)</button>
  </div>

  <ul id="points-list">
    <li class="empty">Пока нет точек</li>
  </ul>

  <ul id="tracks-list">
    <li class="empty">Пока нет треков</li>
  </ul>

  <div id="stats-panel">
    <div id="stats-content">Загрузка…</div>
  </div>
</div>

<div id="sound-controls">
  <button id="btn-sound-toggle" title="Вкл/выкл звук">🔊</button>
  <input type="range" id="volume-slider" min="0" max="100" value="80" title="Громкость" />
  <button id="btn-test">TEST</button>
  <button id="btn-reset">СБРОС</button>
</div>

<button id="export-btn">⬇ ЭКСПОРТ</button>
<div id="export-panel">
  <h3>Экспорт данных смены</h3>

  <div class="export-row">
    <label for="export-hours">Период</label>
    <select id="export-hours">
      <option value="6">6 часов</option>
      <option value="12" selected>12 часов</option>
      <option value="24">24 часа</option>
      <option value="72">72 часа</option>
    </select>
  </div>

  <div class="export-row">
    <label for="export-threat">Уровень угрозы</label>
    <select id="export-threat">
      <option value="">Все уровни</option>
      <option value="OBSERVATION">🟢 Наблюдение</option>
      <option value="ATTENTION">🟡 Внимание</option>
      <option value="THREAT">🔴 Угроза</option>
    </select>
  </div>

  <div id="export-stats-preview">Загрузка статистики…</div>

  <div class="export-format-buttons">
    <button id="export-geojson-btn">GeoJSON</button>
    <button id="export-kmz-btn">KMZ</button>
    <button id="export-csv-btn">CSV</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/sounds/AudioManager.js"></script>
<script src="/static/alerts/AlertManager.js"></script>
<script src="/static/tracks/TrackManager.js"></script>
<script src="/static/export/ExportManager.js"></script>
<script>
  const map = L.map('map').setView([55.7558, 37.6173], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // --- SVG-иконки объектов (вид сверху). Цвет заливки зависит от уровня угрозы, не от типа. ---
  function uavSvg(color) {
    return `
      <svg width="32" height="32" viewBox="0 0 32 32">
        <ellipse cx="16" cy="16" rx="3" ry="12" fill="${color}"/>
        <ellipse cx="16" cy="14" rx="14" ry="3" fill="${color}"/>
        <ellipse cx="16" cy="25" rx="6" ry="2" fill="${color}"/>
      </svg>`;
  }

  function quadSvg(color) {
    return `
      <svg width="36" height="36" viewBox="0 0 36 36">
        <rect x="13" y="13" width="10" height="10" rx="2" fill="${color}"/>
        <line x1="18" y1="18" x2="5" y2="5" stroke="${color}" stroke-width="2"/>
        <line x1="18" y1="18" x2="31" y2="5" stroke="${color}" stroke-width="2"/>
        <line x1="18" y1="18" x2="5" y2="31" stroke="${color}" stroke-width="2"/>
        <line x1="18" y1="18" x2="31" y2="31" stroke="${color}" stroke-width="2"/>
        <circle cx="5" cy="5" r="4" fill="none" stroke="${color}" stroke-width="2"/>
        <circle cx="31" cy="5" r="4" fill="none" stroke="${color}" stroke-width="2"/>
        <circle cx="5" cy="31" r="4" fill="none" stroke="${color}" stroke-width="2"/>
        <circle cx="31" cy="31" r="4" fill="none" stroke="${color}" stroke-width="2"/>
      </svg>`;
  }

  const OBJECT_META = {
    UAV:  { label: 'БЕСПИЛОТНИК', icon: '✈', svg: uavSvg,  size: [32, 32] },
    QUAD: { label: 'КВАДРИК',     icon: '⬡', svg: quadSvg, size: [36, 36] }
  };

  // Цвета — NATO threat color coding (зелёный/жёлтый/красный).
  const THREAT_META = {
    OBSERVATION: { label: 'НАБЛЮДЕНИЕ', icon: '🟢', color: '#4CAF50' },
    ATTENTION:   { label: 'ВНИМАНИЕ',   icon: '🟡', color: '#FF9800' },
    THREAT:      { label: 'УГРОЗА',     icon: '🔴', color: '#F44336' }
  };

  function objectMeta(objectType) {
    return OBJECT_META[objectType] || OBJECT_META.UAV;
  }

  function threatMeta(threatLevel) {
    return THREAT_META[threatLevel] || THREAT_META.OBSERVATION;
  }

  function createObjectIcon(objectType, threatLevel) {
    const meta = objectMeta(objectType);
    const color = threatMeta(threatLevel).color;
    return L.divIcon({
      className: threatLevel === 'THREAT' ? 'threat-marker' : '',
      html: meta.svg(color),
      iconSize: meta.size,
      iconAnchor: [meta.size[0] / 2, meta.size[1] / 2],
      popupAnchor: [0, -meta.size[1] / 2]
    });
  }

  // Конечная точка стрелки направления (~75 метров от маркера), точный угол в градусах
  // (0 = север, 90 = восток, по часовой стрелке — компас, не 4 стороны света).
  function getArrowEnd(lat, lon, degrees, distanceMeters = 75) {
    const R = 6371000;
    const rad = degrees * Math.PI / 180;

    const endLat = lat + (Math.cos(rad) * distanceMeters / R) * (180 / Math.PI);
    const endLon = lon + (Math.sin(rad) * distanceMeters / R) *
                   (180 / Math.PI) / Math.cos(lat * Math.PI / 180);

    return [endLat, endLon];
  }

  function createArrowHeadIcon(color, rotationDeg) {
    return L.divIcon({
      className: '',
      html: `<div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:12px solid ${color};transform:rotate(${rotationDeg}deg);transform-origin:center;"></div>`,
      iconSize: [12, 12],
      iconAnchor: [6, 6]
    });
  }

  function drawDirectionArrow(lat, lon, degrees, color) {
    const end = getArrowEnd(lat, lon, degrees);

    const line = L.polyline([[lat, lon], end], { color, weight: 3 }).addTo(map);
    const arrowHead = L.marker(end, {
      icon: createArrowHeadIcon(color, degrees),
      interactive: false
    }).addTo(map);

    return { line, arrowHead };
  }

  // Пульсирующий круг вокруг маркера УГРОЗЫ.
  function addPulsingMarker(lat, lon) {
    return L.circle([lat, lon], {
      radius: 150,
      color: THREAT_META.THREAT.color,
      fillColor: THREAT_META.THREAT.color,
      fillOpacity: 0.15,
      weight: 2,
      className: 'pulse-circle'
    }).addTo(map);
  }

  const points = [];
  const pointsListEl = document.getElementById('points-list');
  const pointsCountEl = document.getElementById('points-count');
  const sidebar = document.getElementById('sidebar');
  const toggleSidebarBtn = document.getElementById('toggle-sidebar');
  const clearBtn = document.getElementById('clear-btn');
  const statusEl = document.getElementById('status');
  const statusTextEl = document.getElementById('status-text');

  const trackManager = new TrackManager(map);

  toggleSidebarBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

  clearBtn.addEventListener('click', () => {
    points.forEach(({ marker, line, arrowHead, pulseCircle }) => {
      map.removeLayer(marker);
      map.removeLayer(line);
      map.removeLayer(arrowHead);
      if (pulseCircle) map.removeLayer(pulseCircle);
    });
    points.length = 0;
    pointsListEl.innerHTML = '<li class="empty">Пока нет точек</li>';
    pointsCountEl.textContent = '0';
    trackManager.clearAll(); // "Очистить карту" удаляет маркеры И треки
  });

  function formatClock(isoString, withSeconds = false) {
    try {
      const d = new Date(isoString);
      const opts = withSeconds
        ? { hour: '2-digit', minute: '2-digit', second: '2-digit' }
        : { hour: '2-digit', minute: '2-digit' };
      return d.toLocaleTimeString('ru-RU', opts);
    } catch (e) {
      return isoString;
    }
  }

  // Звук/вспышка/тосты/уведомления браузера — AlertManager (static/alerts/AlertManager.js),
  // синтез сигналов без mp3 — AudioManager (static/sounds/AudioManager.js).

  function addPointToSidebar(data, marker) {
    const emptyItem = pointsListEl.querySelector('.empty');
    if (emptyItem) emptyItem.remove();

    const meta = objectMeta(data.object_type);
    const tMeta = threatMeta(data.threat_level);

    const li = document.createElement('li');
    li.classList.add(`level-${(data.threat_level || 'OBSERVATION').toLowerCase()}`);
    li.innerHTML = `
      <span class="entry-icon">${tMeta.icon}</span>
      <span>${formatClock(data.timestamp)} | ${meta.icon} ${data.object_type} | ${data.direction_label} | ${data.user}</span>
    `;
    li.addEventListener('click', () => {
      map.setView([data.lat, data.lon], 16);
      marker.openPopup();
    });
    pointsListEl.prepend(li);
    pointsCountEl.textContent = points.length.toString();
  }

  // Маркер объекта + попап — общая точка входа для живых точек (handleNewPoint)
  // и для исторических точек трека, подгруженных с сервера (TrackManager.loadFromServer).
  function placeObjectMarker(data) {
    const meta = objectMeta(data.object_type);
    const tMeta = threatMeta(data.threat_level);

    const marker = L.marker([data.lat, data.lon], { icon: createObjectIcon(data.object_type, data.threat_level) });
    marker.bindPopup(`
      <div class="popup-card">
        <div class="popup-title">${meta.icon} ${meta.label}</div>
        Угроза: ${tMeta.icon} ${tMeta.label}<br>
        Направление: ${data.direction_label}<br>
        Координаты: ${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}<br>
        Время: ${formatClock(data.timestamp, true)}<br>
        Пользователь: ${data.user}
      </div>
    `);
    return marker;
  }

  function handleNewPoint(data) {
    const tMeta = threatMeta(data.threat_level);

    const marker = placeObjectMarker(data).addTo(map);
    const { line, arrowHead } = drawDirectionArrow(data.lat, data.lon, data.direction_degrees, tMeta.color);
    const pulseCircle = data.threat_level === 'THREAT' ? addPulsingMarker(data.lat, data.lon) : null;
    points.push({ marker, line, arrowHead, pulseCircle });

    addPointToSidebar(data, marker);
    trackManager.addPoint(data); // линия трека, соединяющая точки одного объекта

    // Звук + вспышка + toast + уведомление браузера + фокус — всё по уровню угрозы.
    alertManager.handleNewPoint(data);

    if (data.threat_level === 'THREAT') {
      map.flyTo([data.lat, data.lon], 15, { duration: 1.5 });
    } else {
      map.setView([data.lat, data.lon], 15);
      marker.openPopup();
    }
  }

  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${protocol}://${window.location.host}/ws/operator`);

    ws.onopen = () => {
      statusEl.classList.add('connected');
      statusTextEl.textContent = 'Подключено';
    };

    ws.onclose = () => {
      statusEl.classList.remove('connected');
      statusTextEl.textContent = 'Переподключение...';
      setTimeout(connectWebSocket, 5000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        if (data.type === 'new_point') {
          handleNewPoint(data);
        }
      } catch (e) {
        console.error('Некорректное сообщение WebSocket', e);
      }
    };
  }

  connectWebSocket();

  // --- Табы боковой панели: СОБЫТИЯ / ТРЕКИ / СТАТ ---
  const tracksListEl = document.getElementById('tracks-list');
  const statsPanelEl = document.getElementById('stats-panel');
  const statsContentEl = document.getElementById('stats-content');
  const tabEventsBtn = document.getElementById('tab-events');
  const tabTracksBtn = document.getElementById('tab-tracks');
  const tabStatsBtn = document.getElementById('tab-stats');

  function switchSidebarTab(tab) {
    pointsListEl.style.display = tab === 'events' ? 'block' : 'none';
    tracksListEl.style.display = tab === 'tracks' ? 'block' : 'none';
    statsPanelEl.style.display = tab === 'stats' ? 'block' : 'none';

    tabEventsBtn.classList.toggle('active', tab === 'events');
    tabTracksBtn.classList.toggle('active', tab === 'tracks');
    tabStatsBtn.classList.toggle('active', tab === 'stats');

    if (tab === 'tracks') loadTracksList();
    if (tab === 'stats') loadStats();
  }

  tabEventsBtn.addEventListener('click', () => switchSidebarTab('events'));
  tabTracksBtn.addEventListener('click', () => switchSidebarTab('tracks'));
  tabStatsBtn.addEventListener('click', () => switchSidebarTab('stats'));

  async function loadTracksList() {
    try {
      const res = await fetch('/api/tracks/?hours=12');
      if (!res.ok) return;
      const tracks = await res.json();

      if (tracks.length === 0) {
        tracksListEl.innerHTML = '<li class="empty">Пока нет треков</li>';
        return;
      }

      tracksListEl.innerHTML = '';
      tracks.forEach((track) => {
        const meta = objectMeta(track.object_type);
        const tMeta = threatMeta(track.max_threat);
        const li = document.createElement('li');
        li.innerHTML = `
          <div>${meta.icon} ${track.object_type} — ${track.point_count} ${pointsWord(track.point_count)}
            <span style="color:${tMeta.color}">● ${tMeta.label}</span></div>
          <div class="track-meta">${formatClock(track.start_time)} → ${formatClock(track.end_time)} | 👤 ${track.user_id}</div>
        `;
        li.addEventListener('click', () => {
          map.fitBounds([[track.min_lat, track.min_lon], [track.max_lat, track.max_lon]], { padding: [40, 40] });
        });
        tracksListEl.appendChild(li);
      });
    } catch (e) {
      console.error('Ошибка загрузки треков:', e);
    }
  }

  function pointsWord(count) {
    const mod10 = count % 10;
    const mod100 = count % 100;
    if (mod10 === 1 && mod100 !== 11) return 'точка';
    if ([2, 3, 4].includes(mod10) && ![12, 13, 14].includes(mod100)) return 'точки';
    return 'точек';
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/tracks/stats/shift?hours=12');
      if (!res.ok) return;
      const stats = await res.json();

      statsContentEl.innerHTML = `
        <div class="stat-row"><span>Всего точек</span><b>${stats.total}</b></div>
        <div class="stat-row" style="color:#F44336"><span>🔴 Угрозы</span><b>${stats.threats}</b></div>
        <div class="stat-row" style="color:#FF9800"><span>🟡 Внимание</span><b>${stats.attention}</b></div>
        <div class="stat-row" style="color:#4CAF50"><span>🟢 Наблюдение</span><b>${stats.observation}</b></div>
        <div class="stat-row"><span>Треков</span><b>${stats.total_tracks}</b></div>
        <div class="stat-row"><span>Наблюдателей</span><b>${stats.active_users}</b></div>
      `;
    } catch (e) {
      console.error('Ошибка загрузки статистики:', e);
    }
  }

  // Статистика обновляется каждые 60 секунд, пока открыта соответствующая вкладка.
  setInterval(() => {
    if (statsPanelEl.style.display === 'block') loadStats();
  }, 60000);

  // История за смену подгружается один раз при открытии панели.
  trackManager.loadFromServer(12);

  // --- Панель управления звуком ---
  const soundToggleBtn = document.getElementById('btn-sound-toggle');
  const volumeSlider = document.getElementById('volume-slider');
  const testBtn = document.getElementById('btn-test');
  const resetBtn = document.getElementById('btn-reset');

  soundToggleBtn.textContent = audioManager.enabled ? '🔊' : '🔇';
  volumeSlider.value = Math.round(audioManager.volume * 100);

  soundToggleBtn.addEventListener('click', () => {
    const enabled = audioManager.toggle();
    soundToggleBtn.textContent = enabled ? '🔊' : '🔇';
  });

  volumeSlider.addEventListener('input', (e) => {
    audioManager.setVolume(e.target.value / 100);
  });

  resetBtn.addEventListener('click', () => alertManager.clearAll());

  // Прогон всех трёх уровней подряд — удобно проверить звук/цвет/маркер сразу после
  // деплоя. Вызывает полноценный handleNewPoint() (не только alertManager), чтобы
  // TEST реально клал маркер на карту — иначе кнопка проверяла только звук/toast/flash,
  // и казалось, что иконки объектов не отрисовываются.
  async function testAlerts() {
    const testData = {
      object_type: 'UAV',
      direction_degrees: 47,
      direction_label: 'СЕВЕРО-ВОСТОК (47°)',
      user: 'TEST',
      lat: 55.7558,
      lon: 37.6173,
      timestamp: new Date().toISOString()
    };

    // Небольшое смещение по широте на каждый шаг — иначе все 3 тестовых маркера
    // легли бы в одну точку и перекрывали друг друга.
    handleNewPoint({ ...testData, lat: testData.lat + 0.006, threat_level: 'OBSERVATION' });
    await new Promise((r) => setTimeout(r, 2000));

    handleNewPoint({ ...testData, lat: testData.lat + 0.003, threat_level: 'ATTENTION' });
    await new Promise((r) => setTimeout(r, 2000));

    handleNewPoint({ ...testData, threat_level: 'THREAT' });
  }

  testBtn.addEventListener('click', () => testAlerts());
</script>
</body>
</html>
