org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# --- Адрес backend-сервера ---
# По умолчанию — локальная разработка против эмулятора Android Studio (обычный
# HTTP, без TLS, см. network_security_config.xml). Для боевого сервера за Nginx
# с TLS замени все четыре значения ниже на свои (см. README "Смена сертификата"):
#   SERVER_IP=192.168.1.100
#   SERVER_URL=https://192.168.1.100
#   WS_URL=wss://192.168.1.100/ws/operator
#   CERT_PIN=<вывод generate_cert.sh, "SHA-256 pin для Certificate Pinning">
SERVER_IP=10.0.2.2
SERVER_URL=http://10.0.2.2:8002
WS_URL=ws://10.0.2.2:8002/ws/operator
CERT_PIN=
